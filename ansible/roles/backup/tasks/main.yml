---
- name: Fail if backup encryption is enabled but no recipient is set
  assert:
    that:
      - backup_age_recipient | length > 0
    fail_msg: "backup_age_recipient must be set when backup_encryption_enabled=true"
  when: backup_encryption_enabled | bool

- name: Ensure backup directory exists
  file:
    path: "{{ hermes_backup_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0700"

- name: Install age for encryption
  apt:
    name: age
    state: present
  when: backup_encryption_enabled | bool

- name: Deploy backup script
  template:
    src: hermes-backup.sh.j2
    dest: "{{ backup_script_path }}"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0700"

- name: Schedule daily backup cron
  cron:
    name: hermes backup
    user: "{{ hermes_user }}"
    hour: "2"
    minute: "0"
    job: "{{ backup_script_path }}"
    cron_file: hermes-backup
