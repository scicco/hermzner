---
- name: Install system packages
  apt:
    name:
      - ufw
      - unattended-upgrades
    state: present

- name: Enable unattended-upgrades
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"

- name: Set UFW defaults
  ufw:
    direction: "{{ item.dir }}"
    policy: "{{ item.policy }}"
  loop:
    - { dir: incoming, policy: deny }
    - { dir: outgoing, policy: allow }

- name: Allow SSH on tailscale interface
  ufw:
    rule: allow
    interface: tailscale0
    port: "22"
    proto: tcp

- name: Apply public SSH policy
  block:
    - name: Allow SSH from deployer IP (restricted mode)
      ufw:
        rule: allow
        port: "22"
        proto: tcp
        from_ip: "{{ deployer_ip }}"
      when:
        - public_ssh_policy == "restricted"
        - deployer_ip is defined
        - deployer_ip | length > 0

    - name: Do not add public SSH allow rule (disabled_after_tailscale)
      debug:
        msg: "Public SSH will be disabled after Tailscale is verified"
      when: public_ssh_policy == "disabled_after_tailscale"

    - name: Allow SSH from anywhere (open_key_only mode)
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      when: public_ssh_policy == "open_key_only"
  when: public_ssh_policy != "disabled_after_tailscale"

- name: Enable UFW
  ufw:
    state: enabled

- name: Configure sshd hardening
  block:
    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: restart sshd

    - name: Disable root password login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin prohibit-password"
      notify: restart sshd

    - name: Restrict SSH to specific users
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?AllowUsers"
        line: "AllowUsers {{ hermes_user }} root"
      notify: restart sshd

    - name: Set SSH MaxAuthTries
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?MaxAuthTries"
        line: "MaxAuthTries 3"
      notify: restart sshd

    - name: Set SSH MaxSessions
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?MaxSessions"
        line: "MaxSessions 5"
      notify: restart sshd
  when: sshd_hardening_enabled | bool

- name: Set hermes user umask
  lineinfile:
    path: "{{ hermes_home }}/.bashrc"
    line: "umask 077"
    regexp: "^umask "
    create: true
    owner: "{{ hermes_user }}"
    mode: "0644"

- name: Set system-wide umask
  copy:
    content: "umask 077\n"
    dest: /etc/profile.d/umask.sh
    mode: "0644"

- name: Harden sysctl
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { key: net.ipv4.ip_forward, value: "0" }
    - { key: net.ipv4.conf.all.accept_source_route, value: "0" }
    - { key: kernel.kptr_restrict, value: "2" }
    - { key: kernel.dmesg_restrict, value: "1" }
    - { key: net.ipv4.conf.all.rp_filter, value: "1" }
    - { key: net.ipv4.conf.default.rp_filter, value: "1" }
    - { key: net.ipv4.icmp_echo_ignore_broadcasts, value: "1" }
    - { key: net.ipv4.tcp_syncookies, value: "1" }
    - { key: net.ipv4.conf.all.log_martians, value: "1" }
    - { key: net.ipv4.conf.default.log_martians, value: "1" }
    - { key: net.ipv6.conf.all.accept_source_route, value: "0" }
    - { key: net.ipv6.conf.default.accept_source_route, value: "0" }
    - { key: net.ipv6.conf.all.accept_redirects, value: "0" }
    - { key: net.ipv6.conf.default.accept_redirects, value: "0" }
    - { key: net.ipv6.conf.all.accept_ra, value: "0" }
    - { key: net.ipv6.conf.default.accept_ra, value: "0" }

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present
  when: security_fail2ban_enabled | bool

- name: Create fail2ban jail.local
  copy:
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 3
      ignoreip = 127.0.0.1/8 ::1

      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
      maxretry = 3
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban
  when: security_fail2ban_enabled | bool

- name: Enable and start fail2ban
  systemd:
    name: fail2ban
    state: started
    enabled: true
  when: security_fail2ban_enabled | bool

- name: Disable unused network services
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  failed_when: false
  loop:
    - avahi-daemon
    - cups
    - ModemManager
    - multipathd
    - udisks2
  when: security_disable_unused_services | bool

- name: Secure /dev/shm mount options
  mount:
    path: /dev/shm
    src: tmpfs
    fstype: tmpfs
    opts: "defaults,noexec,nosuid,nodev"
    state: mounted
  when: security_harden_shared_memory | bool
