---
- name: Verify Hermes deployment security
  hosts: hermes
  gather_facts: false
  become: true

  tasks:
    - name: Inspect container
      command: podman inspect hermes
      register: inspect
      changed_when: false

    - name: Container must not be privileged
      assert:
        that:
          - not (inspect.stdout | from_json | first).HostConfig.Privileged
        fail_msg: "Container is running in privileged mode"

    - name: User namespace must be active
      assert:
        that:
          - (inspect.stdout | from_json | first).HostConfig.UsernsMode | length > 0
        fail_msg: "User namespace is not active"

    - name: All capabilities must be dropped
      assert:
        that:
          - (inspect.stdout | from_json | first).HostConfig.CapDrop | select('equalto', 'ALL') | list | length > 0
        fail_msg: "Not all capabilities are dropped"

    - name: no-new-privileges must be enabled
      assert:
        that:
          - (inspect.stdout | from_json | first).HostConfig.SecurityOpt | select('search', 'no-new-privileges') | list | length > 0
        fail_msg: "no-new-privileges is not enabled"

    - name: Check port binding
      command: podman port hermes
      register: port_info
      changed_when: false

    - name: Ports must be bound to localhost
      assert:
        that:
          - "'127.0.0.1' in port_info.stdout"
        fail_msg: "Ports are not bound to 127.0.0.1"

    - name: Check running user
      command: podman top hermes user huser
      register: top_info
      changed_when: false

    - name: Must run as hermes (non-root)
      assert:
        that:
          - "'hermes' in top_info.stdout"
        fail_msg: "Container is running as root"

    - name: Check data directory permissions
      stat:
        path: "{{ hermes_data_dir }}"
      register: data_dir_stat

    - name: Data directory must be 0700
      assert:
        that:
          - data_dir_stat.stat.mode == '0700'
        fail_msg: "{{ hermes_data_dir }} permissions are not 0700"

    - name: Check .env file permissions
      stat:
        path: "{{ hermes_data_dir }}/.env"
      register: env_stat

    - name: .env must be 0600
      assert:
        that:
          - env_stat.stat.mode == '0600'
        fail_msg: ".env file permissions are not 0600"

    - name: Check container health
      command: curl -sf http://127.0.0.1:8642/health
      register: health
      changed_when: false
      failed_when: false

    - name: Health endpoint must respond
      assert:
        that:
          - health.rc == 0
        fail_msg: "Health endpoint is not responding on port 8642"
